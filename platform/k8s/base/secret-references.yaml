apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: relay-runtime-secrets
  namespace: aether-relay
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-secret-store
    kind: ClusterSecretStore
  target:
    name: relay-runtime-secrets
    creationPolicy: Owner
  data:
    - secretKey: sql-dsn
      remoteRef:
        key: aether-relay-sql-dsn
    - secretKey: router-api-key
      remoteRef:
        key: aether-relay-router-api-key
    - secretKey: router-admin-key
      remoteRef:
        key: aether-relay-router-admin-key
    - secretKey: api-key-hash-secret
      remoteRef:
        key: aether-relay-api-key-hash-secret
    - secretKey: account-service-key
      remoteRef:
        key: aether-relay-account-service-key
