apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: relay-gateway
  namespace: aether-relay
  annotations:
    networking.gke.io/certmap: replace-with-certificate-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: api.example.com
      tls:
        mode: Terminate
        options:
          networking.gke.io/pre-shared-certs: replace-with-certificate
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: relay-routes
  namespace: aether-relay
spec:
  parentRefs:
    - name: relay-gateway
  hostnames:
    - api.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
        - path:
            type: PathPrefix
            value: /v1beta
      backendRefs:
        - name: relay
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /account
      backendRefs:
        - name: account
          port: 80
