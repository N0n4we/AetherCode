apiVersion: apps/v1
kind: Deployment
metadata:
  name: account
  namespace: aether-relay
  labels:
    app.kubernetes.io/name: account
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: account
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account
    spec:
      serviceAccountName: account
      containers:
        - name: account
          image: ghcr.io/aethercode/router:latest
          imagePullPolicy: IfNotPresent
          command: ["/account-service"]
          envFrom:
            - configMapRef:
                name: relay-runtime-config
          env:
            - name: ROUTER_ADDR
              value: ":8080"
            - name: SQL_DSN
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: sql-dsn
            - name: API_KEY_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: api-key-hash-secret
            - name: ACCOUNT_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: account-service-key
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: account
  namespace: aether-relay
  labels:
    app.kubernetes.io/name: account
spec:
  selector:
    app.kubernetes.io/name: account
  ports:
    - name: http
      port: 80
      targetPort: http
