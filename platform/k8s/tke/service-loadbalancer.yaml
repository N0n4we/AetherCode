apiVersion: v1
kind: Service
metadata:
  name: relay-public
  namespace: aether-relay
  labels:
    app.kubernetes.io/name: relay
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: relay
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: account-public
  namespace: aether-relay
  labels:
    app.kubernetes.io/name: account
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: account
  ports:
    - name: http
      port: 80
      targetPort: http
