apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay
  namespace: aether-relay
  labels:
    app.kubernetes.io/name: relay
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relay
    spec:
      serviceAccountName: relay
      initContainers:
        - name: migrate-platform-schema
          image: ghcr.io/aethercode/router:latest
          imagePullPolicy: IfNotPresent
          command: ["/migrate"]
          env:
            - name: SQL_DSN
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: sql-dsn
      containers:
        - name: relay
          image: ghcr.io/aethercode/router:latest
          imagePullPolicy: IfNotPresent
          command: ["/router"]
          envFrom:
            - configMapRef:
                name: relay-runtime-config
          env:
            - name: ROUTER_ADDR
              value: ":8080"
            - name: ROUTER_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SQL_DSN
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: sql-dsn
            - name: ROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: router-api-key
                  optional: true
            - name: ROUTER_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: router-admin-key
            - name: API_KEY_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: api-key-hash-secret
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: relay-runtime-secrets
                  key: openrouter-api-key
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: relay
  namespace: aether-relay
  labels:
    app.kubernetes.io/name: relay
spec:
  selector:
    app.kubernetes.io/name: relay
  ports:
    - name: http
      port: 80
      targetPort: http
